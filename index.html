<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>TrxWin Wingo 1 - Results Data Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Align with All-in-one.html - light + Neumorphism + TrxWin red */
        :root {
            --font-sans: 'Inter', ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
            --bg: #f1f5f9;
            --text: #0f172a;
            --muted: #475569;
            --neumo-base: #e4e9f0;
            --neumo-text: #2d3748;
            --neumo-muted: #718096;
            --neumo-sh-dark: rgba(163, 177, 198, 0.52);
            --neumo-sh-light: rgba(255, 255, 255, 0.92);
            --neumo-accent: #ff3838;
            --neumo-raise: 6px 6px 12px var(--neumo-sh-dark), -6px -6px 12px var(--neumo-sh-light);
            --neumo-raise-sm: 4px 4px 8px var(--neumo-sh-dark), -4px -4px 8px var(--neumo-sh-light);
            --neumo-inset: inset 5px 5px 10px var(--neumo-sh-dark), inset -5px -5px 10px var(--neumo-sh-light);
            --neumo-inset-sm: inset 3px 3px 6px var(--neumo-sh-dark), inset -3px -3px 6px var(--neumo-sh-light);
            --main-color: #ff4757;
            --main-color-dark: #ff3838;
            --main-color-light: #ff6b7a;
            --main-color-alpha-10: rgba(255, 71, 87, 0.12);
            --main-color-alpha-20: rgba(255, 71, 87, 0.22);
            --main-color-alpha-30: rgba(255, 71, 87, 0.32);
            --main-color-alpha-50: rgba(255, 71, 87, 0.45);
            --main-color-alpha-80: rgba(255, 71, 87, 0.75);
            --yellow-accent: #ca8a04;
            --white-bg: #ffffff;
            --blue-bg: #f1f5f9;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg);
            padding: 32px;
            min-height: 100vh;
            color: var(--text);
            position: relative;
            overflow-x: hidden;
            -webkit-text-size-adjust: 100%;
            padding-top: calc(32px + env(safe-area-inset-top));
            padding-bottom: calc(32px + env(safe-area-inset-bottom));
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--neumo-base);
            border-radius: 26px;
            padding: 32px;
            position: relative;
            z-index: 1;
            border: none;
            box-shadow: var(--neumo-raise);
        }

        /* View_Results page brand (top-left) */
        #resultsContainer .results-brand-header {
            text-align: left;
            align-self: flex-start;
            width: 100%;
            margin-bottom: 4px;
        }
        #resultsContainer .results-brand-title {
            color: var(--neumo-text);
            font-size: clamp(1.15rem, 3.8vw, 1.55rem);
            font-weight: 800;
            letter-spacing: 0.04em;
            line-height: 1.2;
            margin: 0 0 4px 0;
            text-align: left;
            white-space: normal;
        }
        #resultsContainer .results-brand-sub {
            margin: 0;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--neumo-muted);
            letter-spacing: 0.06em;
            text-align: left;
        }

        /* View_Results page h1 (fallback / other pages) */
        #resultsContainer h1,
        .results-container h1 {
            color: var(--neumo-text);
        }

        h1 {
            color: var(--neumo-text);
            text-align: center;
            margin-bottom: 12px;
            font-size: clamp(1.6rem, 5.4vw, 2.8rem);
            font-weight: 800;
            letter-spacing: 1.5px;
            white-space: nowrap;
            overflow: visible;
            text-overflow: clip;
            word-break: keep-all;
            line-height: 1.2;
            text-shadow: none;
        }
        
        .title-subtitle span {
            display: inline-block;
            letter-spacing: inherit;
        }

        .subtitle {
            text-align: center;
            color: var(--neumo-muted);
            margin-bottom: 40px;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 18px;
        }

        button {
            background: linear-gradient(145deg, #ff6b7a 0%, #ff4757 45%, #ff3838 100%);
            color: #fefefe;
            border: 0;
            padding: 12px 24px;
            border-radius: 18px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            box-shadow:
                6px 6px 14px rgba(79, 70, 229, 0.3),
                -4px -4px 12px rgba(255, 255, 255, 0.35);
        }

        button:hover:not(:disabled) {
            box-shadow:
                4px 4px 12px rgba(79, 70, 229, 0.28),
                -3px -3px 10px rgba(255, 255, 255, 0.4);
        }

        button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            box-shadow: none;
        }

        .status {
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 2px solid var(--main-color);
            background: var(--white-bg);
            color: var(--main-color);
        }

        .status.loading {
            background: var(--white-bg);
            color: var(--main-color);
            border-color: var(--main-color);
        }

        .status.success {
            background: var(--white-bg);
            color: var(--main-color);
            border-color: var(--main-color);
        }

        .status.error {
            background: var(--white-bg);
            color: var(--main-color);
            border-color: var(--main-color);
        }

        .status::before {
            content: '';
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: inline-block;
            background: var(--main-color);
        }

        .status.loading::before {
            background: var(--main-color);
        }

        .status.success::before {
            background: var(--main-color);
        }

        .status.error::before {
            background: var(--main-color);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 28px;
            background: var(--white-bg);
            border-radius: 20px;
            overflow: hidden;
            border: none;
            box-shadow: var(--neumo-inset-sm);
        }

        thead {
            background: linear-gradient(145deg, #eef2ff 0%, #e0e7ff 100%);
            color: var(--neumo-text);
        }

        th {
            padding: 20px 22px;
            text-align: left;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.35em;
            color: var(--main-color-dark);
            border-bottom: 1px solid var(--main-color-alpha-20);
        }

        th:first-child {
            border-top-left-radius: 24px;
        }

        th:last-child {
            border-top-right-radius: 24px;
        }

        td {
            padding: 18px 22px;
            border-bottom: 1px solid rgba(15, 23, 42, 0.06);
            font-size: 0.95rem;
            color: var(--neumo-text);
            background: var(--white-bg);
        }

        td.period-number,
        td.number-column {
            color: var(--text);
            font-weight: 800;
        }


        tbody tr:hover {
            background: var(--main-color-alpha-10);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        /* Legacy classes - kept for compatibility */
        .big {
            color: #ca8a04;
            font-weight: 800;
            font-size: 16px;
        }

        .small {
            color: var(--main-color-dark);
            font-weight: 800;
            font-size: 16px;
        }

        /* Legacy issue-number class - kept for compatibility */
        .issue-number {
            font-weight: 700;
            color: var(--main-color);
            font-size: 16px;
            font-family: 'Courier New', monospace;
        }

        /* Legacy premium-bright class - kept for compatibility */
        .premium-bright {
            font-family: 'Courier New', monospace;
            background: var(--yellow-accent);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 800;
            color: #000000;
            border: 2px solid var(--yellow-accent);
            display: inline-block;
            letter-spacing: 1px;
        }
        
        /* Enhanced Premium Code - using premium-code class */
        .premium-code {
            font-family: var(--font-sans);
            background: var(--neumo-base);
            padding: 10px 16px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            color: var(--neumo-text);
            border: none;
            display: inline-block;
            letter-spacing: 0.45em;
            text-transform: uppercase;
            box-shadow: var(--neumo-inset-sm);
        }

        .timestamp {
            color: var(--neumo-muted);
            font-size: 12px;
            font-weight: 500;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
            margin-bottom: 36px;
        }

        .count-display {
            background: var(--neumo-base);
            padding: 26px;
            border-radius: 22px;
            border: none;
            box-shadow: var(--neumo-raise);
            position: relative;
            overflow: hidden;
        }

        .count-display::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.08), transparent),
                        radial-gradient(circle at 80% 0%, rgba(234, 179, 8, 0.08), transparent);
            opacity: 1;
            pointer-events: none;
        }

        .count-label {
            color: var(--neumo-text);
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 16px;
            text-align: center;
            letter-spacing: 0.4em;
            text-transform: uppercase;
        }

        .loading-bar-container {
            width: 100%;
            height: 52px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 26px;
            border: 2px solid var(--main-color-alpha-30);
            overflow: hidden;
            position: relative;
        }

        .loading-bar {
            height: 100%;
            border-radius: 26px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            transition: width 0.6s ease;
            position: relative;
            min-width: 60px;
            font-weight: 800;
            letter-spacing: 0.2em;
        }

        .loading-bar.yellow {
            background: linear-gradient(120deg, #ffd86f, #ffc400);
            box-shadow: 0 8px 20px rgba(255, 196, 0, 0.35);
        }

        .count-number {
            color: #1e1b4b;
            font-weight: 900;
            font-size: 1.1rem;
        }

        .no-data {
            text-align: center;
            padding: 80px 20px;
            color: var(--neumo-muted);
            background: var(--neumo-base);
            border-radius: 16px;
            border: 1px dashed var(--main-color-alpha-30);
            box-shadow: var(--neumo-inset-sm);
        }

        .no-data svg {
            width: 100px;
            height: 100px;
            margin-bottom: 24px;
            opacity: 0.4;
        }

        .realtime-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--white-bg);
            color: var(--main-color);
            border: 2px solid var(--main-color);
            border-radius: 20px;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            position: relative;
        }

        .realtime-indicator::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--main-color);
            border-radius: 50%;
        }

        .last-update {
            text-align: center;
            color: var(--main-color);
            font-size: 13px;
            margin-top: 20px;
            padding: 12px;
            background: var(--white-bg);
            border-radius: 8px;
            border: 2px solid var(--main-color);
            font-weight: 500;
        }

        /* Quantum AI Key Unlock Styles */
        .hidden { display: none !important; }
        
        /* Mobile responsive - No Boxes, Smaller Text */
        @media (max-width: 768px) {
            body {
                padding: 8px 6px;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }
            
            .container {
                padding: 10px 8px;
                border-radius: 0;
            }
            
            h1 {
                font-size: 1rem;
                letter-spacing: 0;
                padding: 0;
                margin-bottom: 4px;
            }
            
            .title-subtitle {
                font-size: 0.85rem;
                margin-bottom: 8px;
            }
            
            .subtitle {
                font-size: 0.75rem;
                margin-bottom: 10px;
            }
            
            .quantum-title {
                font-size: 1rem;
                letter-spacing: 0;
                padding: 0;
            }
            
            .quantum-gate {
                padding: 30px 20px;
            }
            
            .quantum-input {
                padding: 14px 16px;
                font-size: 15px;
            }
            
            .quantum-timer {
                padding: 12px;
                font-size: 0.9rem;
            }
            
            .quantum-timer-text {
                font-size: 0.9rem;
            }
            
            .button {
                font-size: 15px;
                padding: 0.3em 0;
                height: 2.3em;
            }
            
            table {
                font-size: 0.6rem;
                margin-top: 8px;
                width: 100%;
                max-width: 100%;
            }
            
            th, td {
                padding: 5px 3px;
                font-size: 0.6rem;
            }
            
            th {
                font-size: 0.6rem;
            }
            
            .prediction-box, .stats-merged {
                padding: 0;
                margin-bottom: 10px;
            }
            
            .prediction-label {
                font-size: 0.7rem;
            }
            
            .prediction-value {
                font-size: 0.85rem;
            }
            
            .stats-label-row {
                font-size: 0.7rem;
            }
            
            .stats {
                flex-direction: column;
                gap: 10px;
            }
            
            .count-display {
                width: 100%;
            }
        }
        
        @media (max-width: 480px) {
            h1 {
                font-size: 1.2rem;
            }
            
            .quantum-title {
                font-size: 1.3rem;
                letter-spacing: 0.2em;
            }
            
            .container {
                padding: 15px 10px;
            }
            
            .quantum-gate {
                padding: 26px 20px 32px;
                border-radius: 22px;
            }
            
            .quantum-input {
                letter-spacing: 0.28em;
                font-size: 0.9rem;
            }
            
            .quantum-button {
                letter-spacing: 0.25em;
            }
        }
        
        /* ========== KEY ENTRY SECTION ========== */
        #gate {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            overflow-x: hidden;
            overflow-y: hidden;
            background: var(--bg);
            padding: clamp(20px, 4vw, 50px);
        }

        #gate::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(60% 80% at 50% 20%, rgba(99, 102, 241, 0.12), transparent 60%);
            opacity: 1;
        }
        
        .quantum-gate {
            width: min(480px, 100%);
            padding: clamp(28px, 6vw, 48px);
            border-radius: 28px;
            background: var(--neumo-base);
            border: none;
            box-shadow: var(--neumo-raise);
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 18px;
            text-align: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            overflow: hidden;
        }
        
        .quantum-gate::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(120deg, rgba(159,169,189,0.45), rgba(255,255,255,0));
            mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            mask-composite: xor;
            pointer-events: none;
        }
        
        .quantum-title {
            font-family: var(--font-sans);
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--neumo-text);
            letter-spacing: 0.08em;
            text-transform: none;
            line-height: 1.3;
            white-space: nowrap;
            text-align: center;
            text-shadow: none;
            margin-bottom: 8px;
        }

        #gate .gate-brand-header {
            width: 100%;
            text-align: left;
            margin-bottom: 8px;
        }
        #gate .gate-brand-header .quantum-title {
            text-align: left;
            white-space: normal;
            margin-bottom: 4px;
            font-size: clamp(1rem, 3.2vw, 1.25rem);
            letter-spacing: 0.04em;
        }
        .brand-red { color: #dc2626; }
        .brand-black { color: #111827; }
        #gate .gate-brand-sub {
            margin: 0;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--neumo-muted);
            letter-spacing: 0.05em;
        }
        
        .quantum-input {
            width: 100%;
            padding: 18px 22px;
            margin: 4px 0 8px;
            background: #ffffff;
            border: 2px solid var(--main-color-alpha-30);
            border-radius: 18px;
            color: var(--neumo-text);
            font-size: 1rem;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.45em;
            font-weight: 700;
            font-family: var(--font-sans);
            box-shadow: var(--neumo-inset-sm);
        }
        
        .quantum-input::placeholder {
            color: var(--neumo-muted);
            letter-spacing: 0.2em;
        }
        
        .quantum-input:focus {
            outline: none;
            border-color: var(--main-color-dark);
            background: #fff;
            box-shadow: 0 0 0 3px var(--main-color-alpha-20);
        }
        
        .quantum-button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(145deg, #ff6b7a 0%, #ff4757 45%, #ff3838 100%);
            border: none;
            border-radius: 18px;
            color: #ffffff;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            box-shadow:
                6px 6px 14px rgba(79, 70, 229, 0.35),
                -4px -4px 12px rgba(255, 255, 255, 0.35);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .quantum-button:hover {
            box-shadow:
                4px 4px 12px rgba(79, 70, 229, 0.32),
                -3px -3px 10px rgba(255, 255, 255, 0.4);
        }
        
        .quantum-button i {
            font-size: 1.1rem;
        }
        
        /* Clock Loader */
        .loader {
            width: 68px;
            height: 68px;
            border: 6px solid rgba(110, 203, 255, 0.2);
            border-radius: 50%;
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            box-shadow: 0 0 18px rgba(110, 203, 255, 0.3);
        }
        
        .loader span {
            display: block;
            background: var(--main-color);
        }
        
        .loader .hour,
        .loader .min {
            width: 6px;
            height: 22px;
            border-radius: 50px;
            position: absolute;
            top: 24.5px;
            left: 21px;
            transform-origin: top center;
            animation: load9243 1.2s linear infinite;
        }
        
        .loader .min {
            height: 17px;
            animation: load9243 4s linear infinite;
        }
        
        .loader .circel {
            width: 10px;
            height: 10px;
            border-radius: 50px;
            position: absolute;
            top: 19px;
            left: 19px;
            background: #7fd0ff;
        }
        
        @keyframes load9243 {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .quantum-timer {
            margin: 8px 0 4px;
            padding: 16px 18px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            border: 1px solid rgba(110, 203, 255, 0.35);
            font-size: 0.85rem;
            color: #e6f6ff;
            font-weight: 700;
            letter-spacing: 0.3em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .quantum-timer-text {
            color: #e6f6ff;
            font-weight: 800;
            font-size: 0.9rem;
            font-family: 'Orbitron', sans-serif;
        }
        
        /* Telegram Button */
        .telegram-button-wrapper {
            margin-top: 20px;
        }
        
        .button {
            font-family: inherit;
            background: rgba(255, 255, 255, 0.04);
            color: #e6f6ff;
            padding: 0.35em 0;
            font-size: 0.95rem;
            border: 1px solid rgba(110, 203, 255, 0.35);
            border-radius: 999px;
            letter-spacing: 0.3em;
            position: relative;
            display: flex;
            align-content: center;
            align-items: center;
            overflow: hidden;
            height: 3.2em;
            padding-left: 3.2em;
            padding-right: 1.4em;
            width: 100%;
            cursor: pointer;
            box-shadow: inset 0 0 18px rgba(110, 203, 255, 0.12);
        }
        
        .button .icon {
            background: rgba(255, 255, 255, 0.9);
            height: 2.4em;
            width: 2.4em;
            border-radius: 50%;
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            left: 0.6em;
        }
        
        .icon svg {
            margin-left: 0.1em;
            color: var(--main-color-dark);
            width: 1.2rem;
            height: 1.2rem;
        }
        
        .button:hover {
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 12px 30px rgba(8, 17, 34, 0.7);
        }
        
        .quantum-success {
            display: none;
        }
        
        .success-icon {
            display: none;
        }
        
        .results-container {
            display: none;

        // ========== QUANTUM AI KEY UNLOCK FUNCTIONALITY ==========
        const loginConfig = {

        };
        
        const SHARED_EXPIRE_KEY = 'bigwinShared_expireTime';
        const SHARED_ACTIVATED_KEY = 'bigwinShared_activatedKeyId';
        const LEGACY_EXPIRE_KEYS = ['bw1ExpireTime', 'bw30ExpireTime', 'expireTime'];
        const LEGACY_ACTIVATED_KEYS = ['bw1ActivatedKeyId', 'bw30ActivatedKeyId', 'activatedKeyId'];
        function getFirstStoredValue(keys) {
            for (const key of keys) {
                const value = localStorage.getItem(key);
                if (value) return value;
            }
            return null;
        }
        let loginApp = null;
        let loginDb = null;
        let serverOffset = 0;
        let expireTime = parseInt(localStorage.getItem(SHARED_EXPIRE_KEY) || getFirstStoredValue(LEGACY_EXPIRE_KEYS) || '0', 10) || 0;
        let activatedKeyId = localStorage.getItem(SHARED_ACTIVATED_KEY) || getFirstStoredValue(LEGACY_ACTIVATED_KEYS) || null;
        if (expireTime > 0) localStorage.setItem(SHARED_EXPIRE_KEY, String(expireTime));
        if (activatedKeyId) localStorage.setItem(SHARED_ACTIVATED_KEY, activatedKeyId);
        let timerInterval = null;
        let keyStatusListener = null;

        const getServerTime = () => Date.now() + serverOffset;
        
        function initializeLoginFirebase() {
            try {
                loginApp = firebase.initializeApp(loginConfig, 'bw1Login');
                loginDb = loginApp.database();
                // Get server time offset to prevent time manipulation
                loginDb.ref(".info/serverTimeOffset").on("value", snapshot => {
                    serverOffset = snapshot?.val() || 0;
                });
                return true;
            } catch (error) {
                console.error('Login Firebase init error:', error);
                return false;
            }

            const key = document.getElementById('keyInput').value.trim().toUpperCase();
            if (!key) {

            const btn = document.getElementById('activateBtn');

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> VERIFYING...';

                    const data = snapshot.val();
                    
                    // Require explicit TrxWin key type (reject keys without keyType or non-bigwin)

                    const extraTime = data.duration * 60 * 1000;

                    const currentServerTime = getServerTime();
                    expireTime = Math.max(currentServerTime, expireTime) + extraTime;
                    localStorage.setItem(SHARED_EXPIRE_KEY, String(expireTime));
                    
                    // Store server timestamp when key is activated
                    loginDb.ref('keys/' + key).update({ 
                        used: true,
                        activatedAt: firebase.database.ServerValue.TIMESTAMP,
                        expiresAt: expireTime
                    });
                    
                    // Store activated key ID for monitoring
                    activatedKeyId = key;
                    localStorage.setItem(SHARED_ACTIVATED_KEY, key);

            }).catch(error => {
                btn.innerHTML = originalText;
                btn.disabled = false;
                alert("Quantum Network Error. Please try again.");

            });

            if (timerInterval) clearInterval(timerInterval);
            updateTimer();
            timerInterval = setInterval(updateTimer, 1000);
        }
        
        function updateTimer() {
            // Use server time to prevent client time manipulation
            const serverTime = getServerTime();
            const remaining = expireTime - serverTime;
            const gate = document.getElementById("gate");
            const resultsContainer = document.getElementById("resultsContainer");
            const timerEl = document.getElementById('key-timer');
            const resultsTimeEl = document.getElementById('resultsTimeRemaining');
            const resultsTimeText = document.getElementById('resultsTimeText');
            
            if (remaining <= 0) {
                clearInterval(timerInterval);

                if (firebaseListener && db) {

                if (keyStatusListener && loginDb && activatedKeyId) {
                    loginDb.ref('keys/' + activatedKeyId).off('value', keyStatusListener);
                    keyStatusListener = null;
                }
                return;
            }
            
            const hours = Math.floor(remaining / (1000 * 60 * 60));
            const minutes = Math.floor((remaining % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((remaining % (1000 * 60)) / 1000);
            
            const timeText = `${hours}h ${minutes}m ${seconds}s`;
            const timerTextEl = document.getElementById('timerText');
            if (timerTextEl) {
                timerTextEl.textContent = timeText;

            if (keyStatusListener && activatedKeyId) {
                loginDb.ref('keys/' + activatedKeyId).off('value', keyStatusListener);
            }
            
            // Listen for key status changes

                if (!snapshot.exists()) {

                    const remaining = expireTime - getServerTime();
                    if (remaining > 0) {

            if (number === null || number === undefined) return null;

        // Prediction Logic - Updated to work with fewer results
        function calculatePrediction(historyData) {
            if (!historyData || historyData.length < 2) return null;
            const window = historyData.slice(0, Math.min(5, historyData.length));
            let big = 0;
            let small = 0;
            window.forEach((item) => {
                const value = classifyBigSmall(item.number);
                if (value === 'BIG') big += 1;
                else if (value === 'SMALL') small += 1;
            });
            if (big === small) return null;
            return big >= small ? 'SMALL' : 'BIG';
        }
        
        // Calculate Rate based on last 3 predictions accuracy
        function calculateRate(historyData) {
            if (!historyData || historyData.length < 6) return null;
            let correctCount = 0;
            let totalChecked = 0;
            for (let i = 0; i < 3 && i + 5 < historyData.length; i++) {
                const historyForPrediction = historyData.slice(i + 1);
                const predictedValue = calculatePrediction(historyForPrediction);
                const actualResult = historyData[i];
                const actualBigSmall = classifyBigSmall(actualResult.number);
                if (predictedValue && actualBigSmall) {
                    if (predictedValue === actualBigSmall) correctCount++;
                    totalChecked++;
                }
            }
            if (totalChecked === 0) return null;
            const accuracyRate = (correctCount / totalChecked) * 100;
            if (accuracyRate < 33) return 'Low';
            if (accuracyRate <= 66) return 'Medium';
            return 'High';
        }

        function calculateRateFromNumber(number) {
            if (number === null || number === undefined) return null;
            const num = parseInt(number, 10);
            if (Number.isNaN(num)) return null;
            const lastDigit = Math.abs(num) % 10;
            return (lastDigit === 5 || lastDigit === 0) ? 'Low' : 'Medium';
        }

        function computeGlobalPredictionDetails(historyData) {
            if (!historyData || historyData.length < 1) return null;
            const latest = historyData[0];
            const periodSource = (latest.period ?? latest.issueNumber ?? latest.periodNumber ?? '').toString();
            const shortCurrent = parseInt(periodSource.slice(-3), 10);
            const nextShort = Number.isNaN(shortCurrent)
                ? '-'
                : String(shortCurrent + 1).padStart(3, '0').slice(-3);
            const prediction = calculatePrediction(historyData);
            return {
                nextPeriod: nextShort,
                finalPrediction: prediction,
            };
        }

        function processFirebaseData(data) {
            const list = data && data.list && Array.isArray(data.list) ? data.list : [];
            if (list.length === 0) {
                renderTable([], []);
                return;
            }

            // Treat list[0] as the latest finished period result
            const latestRecord = list[0];
            const currentLatestKey = getPeriodKey(latestRecord);

            if (!currentLatestKey) {
                // Fallback: just render whatever history we currently have
                renderTable(list, displayedHistory);
                return;
            }

            if (lastSeenLatestPeriodKey === null) {
                // First load: show the latest finished period as the first history row
                lastSeenLatestPeriodKey = currentLatestKey;
                displayedHistory = [latestRecord];
            } else if (currentLatestKey !== lastSeenLatestPeriodKey) {
                // New period arrived: prepend the new latest result to history
                displayedHistory = [latestRecord].concat(displayedHistory);
                lastSeenLatestPeriodKey = currentLatestKey;
            }

            renderTable(list, displayedHistory);
        }

        });
        
        // Update when browser UI appears/disappears (mobile scroll)
        let lastHeight = window.innerHeight;
        window.addEventListener('scroll', function() {
            const currentHeight = window.innerHeight;
            if (Math.abs(currentHeight - lastHeight) > 50) {
                lastHeight = currentHeight;
                setTimeout(updateWasiteHeight, 100);
            }
        }, { passive: true });

        // Cleanup on page unload
        window.addEventListener('beforeunload', function() {
            if (firebaseListener && db) {
                db.ref(FIREBASE_PATH).off('value', firebaseListener);
            }
        });
    </script>
</body>
</html>
